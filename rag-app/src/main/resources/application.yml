spring:
  application:
    name: spring-ai-alibaba-rag
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5s
      # Redis TLS — enabled by setting REDIS_TLS_ENABLED=true + providing
      # a trust store via REDIS_TLS_TRUSTSTORE / REDIS_TLS_TRUSTSTORE_PASSWORD.
      # Spring Data Redis (Lettuce) reads these and applies the SSL
      # parameters via the LettuceClientConfigurationBuilderCustomizer SPI
      # in rag-redis/.../config/RedisSslAutoConfiguration. The SSL config
      # is opt-in (default disabled) because local docker-compose does
      # not run TLS — flip the env var in production / staging. See
      # docs/RUNBOOK.md §6 for the full rollout procedure.
      ssl:
        enabled: ${REDIS_TLS_ENABLED:false}
  # DashScope key placeholder — required by Spring AI Alibaba auto-config
  # bean construction, but the rag-app's actual LLM/Embedding/Rerank calls
  # go through the SiliconFlow adapters (rag-embedding/siliconflow/*) when
  # rag.siliconflow.api-key is set, otherwise through stubs (rag-embedding/stub/*).
  # See rag-embedding/.env.example for the SiliconFlow key.
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:stub-key-not-used-when-siliconflow-enabled}
      embedding:
        options:
          model: text-embedding-v3

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{tenant:-},%X{requestId:-}] %logger{36} - %msg%n"
  level:
    io.github.yysf1949.rag: INFO
    org.springframework.web: INFO

# ─────────────────────────────────────────────────────────────────
# Phase 7 cluster 6 — Resilience4j circuit breakers (spec §13)
# Two instances wrap the two external surfaces that can fail loudly:
#   - redis:     Redis Stack / RediSearch (vector store + caches)
#   - siliconflow: SiliconFlow HTTP (embedding + rerank + LLM fallback)
# While OPEN, calls short-circuit and we surface the typed *UnavailableException
# so the upstream caller (QAService) degrades uniformly (FALLBACK_RULE / empty).
# Tuning is conservative — RAG has high latency (multi-second embedding/search)
# so we count failures, not time, and recover quickly.
# ─────────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      redis:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - io.github.yysf1949.rag.core.exception.VectorStoreUnavailableException
          - redis.clients.jedis.exceptions.JedisException
      siliconflow:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - io.github.yysf1949.rag.core.exception.EmbeddingUnavailableException
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.util.concurrent.TimeoutException
  # Rate limiter — caps concurrent / per-second requests into QAServiceImpl.
  # Default: 100 req/sec sustained, burst to 200, no max wait (fail fast →
  # HTTP 429). One global bucket is fine because the Redis-backed caches
  # front the heavy legs (cache hit bypasses everything below).
  ratelimiter:
    instances:
      qa:
        registerHealthIndicator: true
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0

# Spec §9.1: rag.qa.* / rag.ingest.* etc. land in the metric-wiring
# phase. For now Spring Boot's auto-publish of jvm.*, http.server.*
# and the actuator's own /actuator/prometheus are available.

# ─────────────────────────────────────────────────────────────────
# Phase 5-P4 — SiliconFlow adapters (real Embedding / Rerank / LLM)
# ─────────────────────────────────────────────────────────────────
# When rag.siliconflow.enabled=true AND rag.siliconflow.api-key is set,
# the SiliconFlow adapters (rag-embedding/siliconflow/*) override the
# stub beans. If the key is missing or the flag is false, the stubs run.
#
# rag.siliconflow.api-key MUST be supplied via env var SILICONFLOW_API_KEY
# (see rag-embedding/.env.example) — never commit a real key to YAML.
rag:
  siliconflow:
    # Bridge: env var SILICONFLOW_API_KEY is the canonical signal.
    # The Surefire `eval` profile (pom.xml) injects it into the forked
    # test JVM via environmentVariables (in addition to systemPropertyVariables),
    # so this single placeholder handles both:
    #   - local dev: `export SILICONFLOW_API_KEY=sk-...` then `mvn ... -Peval`
    #   - CI: env var set on the build agent
    #   - standalone app: yml substitution reads from same env var
    enabled: ${RAG_SILICONFLOW_ENABLED:false}
    api-key: ${SILICONFLOW_API_KEY:}
    base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}
    embedding:
      model: ${SILICONFLOW_EMBEDDING_MODEL:BAAI/bge-m3}
      dimension: ${SILICONFLOW_EMBEDDING_DIM:1024}
      timeout-seconds: 30
      max-retries: 2
    rerank:
      model: ${SILICONFLOW_RERANK_MODEL:BAAI/bge-reranker-v2-m3}
      timeout-seconds: 30
      max-retries: 1
    llm:
      model: ${SILICONFLOW_LLM_MODEL:Qwen/Qwen2.5-7B-Instruct}
      timeout-seconds: 60
      max-retries: 1
      max-tokens: 2048
      temperature: 0.2
  embedding:
    dim: ${SILICONFLOW_EMBEDDING_DIM:1024}
  # ─────────────────────────────────────────────────────────────────
  # Security — API key authentication
  # ─────────────────────────────────────────────────────────────────
  # When rag.security.api-key is set, all endpoints (except actuator
  # health/readiness and Swagger UI) require the X-API-Key header.
  # When blank, all endpoints are open (dev/test mode).
  security:
    api-key: ${RAG_API_KEY:}
    # ─────────────────────────────────────────────────────────────
    # Phase 34 (R5) — JWT/OAuth2 gateway layer
    # ─────────────────────────────────────────────────────────────
    # jwt.enabled: when true, JwtTenantFilter requires a valid HS256
    # Bearer token on every API request. When false (default for
    # dev/test), the filter falls back to a dev-mode passthrough that
    # accepts X-Tenant-Id without a JWT (with a WARN log). Production
    # MUST set this to true and supply a strong secret.
    #
    # jwt.secret: HMAC-SHA256 shared secret. Must be at least 32 bytes
    # to satisfy HS256; supply via env var JWT_SECRET in production.
    # The default below is intentionally weak so JWT misconfiguration
    # fails loud at startup rather than running with a guessable key.
    #
    # jwt.expiration-seconds: TTL for tokens issued by the mock
    # /api/auth/mock-token endpoint (the production IdP would issue its
    # own; this is purely a Phase 34 dev/test affordance).
    #
    # jwt.dev-mode: when true (and jwt.enabled=false), the dev
    # passthrough is active. Set false in production even if
    # jwt.enabled is false, so a missing config fails closed with 401.
    jwt:
      enabled: ${JWT_ENABLED:false}
      secret: ${JWT_SECRET:}
      expiration-seconds: ${JWT_EXPIRATION:3600}
      dev-mode: ${JWT_DEV_MODE:true}
    # ─────────────────────────────────────────────────────────────
    # Phase 34 (R6) — Per-tenant rate limiter (Redis sliding window)
    # ─────────────────────────────────────────────────────────────
    # The limiter keys on tenant id (the value of X-Tenant-Id once
    # the JWT/dev-mode gateway has accepted the request). When Redis
    # is down, the limiter fails open with a warn log — rate limiting
    # is a QoS feature, not a security control.
    rate-limit:
      requests-per-window: ${RATE_LIMIT_REQUESTS:60}
      window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  tenant:
    # HMAC-SHA256 shared secret for X-Tenant-Id header verification.
    # When blank, tenant signature verification is DISABLED (dev/test only).
    # Production: set via env var RAG_TENANT_SECRET.
    shared-secret: ${RAG_TENANT_SECRET:}
