spring:
  application:
    name: spring-ai-alibaba-rag
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5s
  # DashScope key placeholder — required by Spring AI Alibaba auto-config
  # bean construction, but the rag-app's actual LLM/Embedding/Rerank calls
  # go through the SiliconFlow adapters (rag-embedding/siliconflow/*) when
  # rag.siliconflow.api-key is set, otherwise through stubs (rag-embedding/stub/*).
  # See rag-embedding/.env.example for the SiliconFlow key.
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:stub-key-not-used-when-siliconflow-enabled}
      embedding:
        options:
          model: text-embedding-v3

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{tenant:-},%X{requestId:-}] %logger{36} - %msg%n"
  level:
    io.github.yysf1949.rag: INFO
    org.springframework.web: INFO

# ─────────────────────────────────────────────────────────────────
# Phase 7 cluster 6 — Resilience4j circuit breakers (spec §13)
# Two instances wrap the two external surfaces that can fail loudly:
#   - redis:     Redis Stack / RediSearch (vector store + caches)
#   - siliconflow: SiliconFlow HTTP (embedding + rerank + LLM fallback)
# While OPEN, calls short-circuit and we surface the typed *UnavailableException
# so the upstream caller (QAService) degrades uniformly (FALLBACK_RULE / empty).
# Tuning is conservative — RAG has high latency (multi-second embedding/search)
# so we count failures, not time, and recover quickly.
# ─────────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      redis:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - io.github.yysf1949.rag.core.exception.VectorStoreUnavailableException
          - redis.clients.jedis.exceptions.JedisException
      siliconflow:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - io.github.yysf1949.rag.core.exception.EmbeddingUnavailableException
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.util.concurrent.TimeoutException
  # Rate limiter — caps concurrent / per-second requests into QAServiceImpl.
  # Default: 100 req/sec sustained, burst to 200, no max wait (fail fast →
  # HTTP 429). One global bucket is fine because the Redis-backed caches
  # front the heavy legs (cache hit bypasses everything below).
  ratelimiter:
    instances:
      qa:
        registerHealthIndicator: true
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0

# Spec §9.1: rag.qa.* / rag.ingest.* etc. land in the metric-wiring
# phase. For now Spring Boot's auto-publish of jvm.*, http.server.*
# and the actuator's own /actuator/prometheus are available.

# ─────────────────────────────────────────────────────────────────
# Phase 5-P4 — SiliconFlow adapters (real Embedding / Rerank / LLM)
# ─────────────────────────────────────────────────────────────────
# When rag.siliconflow.enabled=true AND rag.siliconflow.api-key is set,
# the SiliconFlow adapters (rag-embedding/siliconflow/*) override the
# stub beans. If the key is missing or the flag is false, the stubs run.
#
# rag.siliconflow.api-key MUST be supplied via env var SILICONFLOW_API_KEY
# (see rag-embedding/.env.example) — never commit a real key to YAML.
rag:
  siliconflow:
    # Bridge: env var SILICONFLOW_API_KEY is the canonical signal.
    # The Surefire `eval` profile (pom.xml) injects it into the forked
    # test JVM via environmentVariables (in addition to systemPropertyVariables),
    # so this single placeholder handles both:
    #   - local dev: `export SILICONFLOW_API_KEY=sk-...` then `mvn ... -Peval`
    #   - CI: env var set on the build agent
    #   - standalone app: yml substitution reads from same env var
    enabled: ${RAG_SILICONFLOW_ENABLED:false}
    api-key: ${SILICONFLOW_API_KEY:}
    base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}
    embedding:
      model: ${SILICONFLOW_EMBEDDING_MODEL:BAAI/bge-m3}
      dimension: ${SILICONFLOW_EMBEDDING_DIM:1024}
      timeout-seconds: 30
      max-retries: 2
    rerank:
      model: ${SILICONFLOW_RERANK_MODEL:BAAI/bge-reranker-v2-m3}
      timeout-seconds: 30
      max-retries: 1
    llm:
      model: ${SILICONFLOW_LLM_MODEL:Qwen/Qwen2.5-7B-Instruct}
      timeout-seconds: 60
      max-retries: 1
      max-tokens: 2048
      temperature: 0.2
  embedding:
    dim: ${SILICONFLOW_EMBEDDING_DIM:1024}
